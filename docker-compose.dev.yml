services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: foi_manager
      POSTGRES_USER: foi_manager
      POSTGRES_PASSWORD: foi_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ollama:
  #   image: ollama/ollama
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "11434:11434"

volumes:
  postgres_data:
